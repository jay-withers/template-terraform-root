name: cd-tag

on:
  push:
    branches: [main]

jobs:
  # Bump the semver tag from the conventional commits since the last release
  # (and create a matching GitHub release) via the shared release template.
  tag:
    permissions:
      contents: write
    uses: jay-withers/template-pipelines/.github/workflows/release.yml@82bf7984120a33073aae075309b09afad91e960b # v0.2.1
